name: Validate Skill Catalog

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-catalog:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11.15"
          cache: ""

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # 6.5.0
        with:
          node-version: "22.22.0"
          cache: ""

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.22"
          enable-cache: false

      - name: Install locked quality-gate dependencies
        run: |
          uv --no-config venv --python python .venv
          uv --no-config pip sync --python .venv/bin/python --require-hashes \
            --only-binary :all: \
            .github/quality-gate-requirements.txt

      - name: Run quality-gate unit tests
        run: .venv/bin/python .github/scripts/tests/test_catalog_quality.py -v

      - name: Type-check quality-gate code
        run: >-
          .venv/bin/pyright
          .github/scripts/catalog_quality.py
          .github/scripts/tests/test_catalog_quality.py

      - name: Validate catalog changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            reference="$BASE_SHA"
          else
            reference="$BEFORE_SHA"
          fi
          if [[ -z "$reference" || "$reference" =~ ^0+$ ]]; then
            echo "Reference commit is unavailable" >&2
            exit 1
          fi
          if ! git cat-file -e "${reference}^{commit}" 2>/dev/null; then
            git fetch --no-tags origin "$reference"
          fi
          .venv/bin/python .github/scripts/catalog_quality.py \
            --changed-from "$reference"
